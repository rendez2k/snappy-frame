<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Snappy Frame — Screenshot Beautifier</title>
<meta name="description" content="Snappy Frame turns plain screenshots into share-ready images: gorgeous backgrounds, patterns, padding, rounded corners, shadows, 3D tilt, window frames, social-media sizes and high-resolution export — all in your browser." />
<meta name="theme-color" content="#0e0f14" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%236d5efc'/><rect x='24' y='30' width='52' height='40' rx='8' fill='none' stroke='white' stroke-width='7'/><circle cx='50' cy='50' r='9' fill='white'/></svg>" />
<script src="vendor/html-to-image.js"></script>
<style>
:root{
  --bg:#0e0f14; --panel:#16181f; --panel-2:#1c1f28; --line:#282c38;
  --line-2:#333848; --text:#e7e9ef; --muted:#9aa0b0; --muted-2:#6b7180;
  --accent:#6d5efc; --accent-2:#8a7dff; --radius:12px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  font-synthesis:none;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  font-size:14px; -webkit-font-smoothing:antialiased; overflow:hidden;
}
button{font-family:inherit; color:inherit; cursor:pointer}
input,select{font-family:inherit}

/* ---------- Layout ---------- */
.app{display:grid; grid-template-rows:auto 1fr; height:100%}
.topbar{
  display:flex; align-items:center; gap:14px; padding:10px 16px;
  border-bottom:1px solid var(--line); background:var(--panel); z-index:10;
}
.brand{display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:-.01em}
.brand .logo{width:26px; height:26px; border-radius:7px;
  background:linear-gradient(135deg,var(--accent),#c05bff); display:grid; place-items:center}
.brand .logo svg{width:16px; height:16px}
.brand small{color:var(--muted-2); font-weight:500; margin-left:2px}
.spacer{flex:1}
.tb-group{display:flex; align-items:center; gap:8px}

.main{display:grid; grid-template-columns:1fr 320px; min-height:0}
@media (max-width:860px){
  .main{grid-template-columns:1fr}
  .panel{position:fixed; inset:auto 0 0 0; max-height:58vh; z-index:20;
    border-left:0; border-top:1px solid var(--line); border-radius:16px 16px 0 0;
    box-shadow:0 -12px 30px rgba(0,0,0,.4)}
  .stage-wrap{padding-bottom:58vh}
}
/* Compact top bar so the Export button never clips on phones */
@media (max-width:600px){
  .topbar{gap:8px; padding:9px 10px}
  .brand small{display:none}
  .brand{font-size:14px; gap:7px}
  .brand .logo{width:24px; height:24px}
  .tb-group{gap:6px}
  #btnScreen .lbl, #btnUpload .lbl{display:none}
  .btn.sm{padding:7px 9px}
  .stage-wrap{padding:14px; padding-bottom:58vh}
}

/* ---------- Stage / preview ---------- */
.stage-wrap{position:relative; min-height:0; overflow:hidden;
  background:
    linear-gradient(45deg,#12131a 25%,transparent 25%,transparent 75%,#12131a 75%),
    linear-gradient(45deg,#12131a 25%,#0b0c11 25%,#0b0c11 75%,#12131a 75%);
  background-size:24px 24px; background-position:0 0,12px 12px;
  display:grid; place-items:center; padding:28px;
}
#fit{transition:transform .12s ease}
#stage{
  position:relative; overflow:hidden; background:#222;
}
/* background pattern overlay: sits above the bg, below the card. Oversized so
   rotation never reveals corner gaps (stage clips it via overflow:hidden). */
#patternLayer{position:absolute; inset:-60%; z-index:1; display:none; pointer-events:none;
  background-repeat:repeat; background-position:center; transform-origin:center;
  mix-blend-mode:overlay; will-change:transform}
/* card is absolutely centred; JS sizes the stage + nudges for perspective */
#persp{position:absolute; left:50%; top:50%; z-index:2; perspective:1600px; will-change:transform}
#card{
  position:relative; display:inline-flex; flex-direction:column; overflow:hidden;
  transform-style:preserve-3d; will-change:transform; background:#0b0c11;
}
#bar{display:none; align-items:center; gap:7px; padding:0 12px; height:34px;
  flex:0 0 auto; user-select:none; position:relative}
#bar .dots{display:flex; gap:7px}
#bar .dots i{width:12px; height:12px; border-radius:50%}
#bar .url{flex:1; margin:0 10px; height:20px; border-radius:6px;
  display:flex; align-items:center; padding:0 10px; font-size:11px; letter-spacing:.01em;
  overflow:hidden; white-space:nowrap}
#bar .title{position:absolute; left:0; right:0; text-align:center; font-size:12px;
  pointer-events:none; opacity:.85}
#bar .wbtns{margin-left:auto; display:none; gap:15px; font-size:11px; letter-spacing:1px;
  align-items:center; padding-right:2px}
/* Matte frames: a coloured border around the screenshot */
#card.arc{background:#f2f2f4; padding:11px}
#card.eclipse{background:#15161c; padding:12px}
#card.emotion{background:#ffffff; padding:9px}
#card.ruler{background:transparent; padding:13px; border:2px dashed rgba(255,255,255,.65)}
#card.shortboard{border:12px solid #16171d}
#card.arc #shot,#card.eclipse #shot,#card.emotion #shot,#card.ruler #shot{border-radius:7px}
#shot{display:block; object-fit:contain}
/* fill (crop) mode: image covers the whole card area below any frame bar */
#card.fill{display:flex}
#shot.fill{flex:1 1 auto; min-height:0; width:100%; height:auto; object-fit:cover}

/* Empty state */
.empty{position:absolute; inset:0; display:grid; place-items:center; pointer-events:none}
.empty .box{pointer-events:auto; text-align:center; padding:34px 40px; border-radius:16px;
  border:1.5px dashed var(--line-2); background:rgba(20,22,30,.72); backdrop-filter:blur(4px);
  max-width:380px}
.empty h2{margin:0 0 6px; font-size:17px}
.empty p{margin:0 0 16px; color:var(--muted); line-height:1.5}
.empty kbd{background:var(--panel-2); border:1px solid var(--line-2); border-bottom-width:2px;
  border-radius:5px; padding:1px 6px; font-size:12px; font-family:ui-monospace,monospace}
.dragover .empty .box{border-color:var(--accent); background:rgba(109,94,252,.14)}

/* ---------- Control panel ---------- */
.panel{background:var(--panel); border-left:1px solid var(--line); overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--line-2) transparent}
.panel::-webkit-scrollbar{width:9px}
.panel::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:9px;
  border:2px solid var(--panel)}
.sec{border-bottom:1px solid var(--line)}
.sec > .head{display:flex; align-items:center; gap:8px; width:100%; padding:13px 16px;
  background:none; border:0; font-weight:600; font-size:13px; text-align:left}
.sec > .head .chev{margin-left:auto; color:var(--muted-2); transition:transform .15s}
.sec.collapsed > .head .chev{transform:rotate(-90deg)}
.sec > .body{padding:2px 16px 16px}
.sec.collapsed > .body{display:none}
.sec .ico{width:16px; color:var(--muted)}

.field{margin:12px 0}
.field:first-child{margin-top:4px}
.field > label{display:flex; justify-content:space-between; align-items:center;
  font-size:12px; color:var(--muted); margin-bottom:7px}
.field > label .val{color:var(--text); font-variant-numeric:tabular-nums;
  background:var(--panel-2); padding:1px 7px; border-radius:5px; font-size:11px}

/* range */
input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:4px;
  border-radius:4px; background:var(--line-2); outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px;
  border-radius:50%; background:#fff; border:0; box-shadow:0 1px 4px rgba(0,0,0,.4);
  cursor:pointer; transition:transform .1s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:16px; height:16px; border-radius:50%; background:#fff;
  border:0; cursor:pointer}

/* segmented / chips */
.seg{display:flex; background:var(--panel-2); border-radius:9px; padding:3px; gap:2px}
.seg button{flex:1; border:0; background:none; color:var(--muted); padding:6px 4px;
  border-radius:7px; font-size:12px; font-weight:500; transition:.12s}
.seg button.on{background:var(--line-2); color:var(--text)}
.chips{display:flex; flex-wrap:wrap; gap:7px}
.chips button{border:1px solid var(--line-2); background:var(--panel-2); color:var(--muted);
  padding:5px 11px; border-radius:20px; font-size:12px; transition:.12s}
.chips button.on{border-color:var(--accent); color:#fff; background:rgba(109,94,252,.18)}

/* swatch grid */
.swatches{display:grid; grid-template-columns:repeat(6,1fr); gap:8px}
.swatches button{aspect-ratio:1; border-radius:9px; border:2px solid transparent;
  cursor:pointer; position:relative; padding:0}
.swatches button.on{border-color:#fff; box-shadow:0 0 0 2px var(--accent)}

/* row of two */
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.row2.tight{gap:8px}

/* color input */
.color{display:flex; align-items:center; gap:8px; background:var(--panel-2);
  border:1px solid var(--line-2); border-radius:8px; padding:5px 8px}
.color input[type=color]{width:26px; height:26px; padding:0; border:0; background:none;
  border-radius:6px; cursor:pointer}
.color input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.color input[type=color]::-webkit-color-swatch{border:1px solid var(--line-2); border-radius:6px}
.color input[type=text]{flex:1; background:none; border:0; color:var(--text); font-size:12px;
  font-family:ui-monospace,monospace; outline:none; width:100%; text-transform:uppercase}

select.sel{width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line-2);
  border-radius:8px; padding:8px 10px; font-size:12px; outline:none; cursor:pointer}
input.txt{width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line-2);
  border-radius:8px; padding:8px 10px; font-size:12px; outline:none}
input.txt:focus,select.sel:focus{border-color:var(--accent)}

/* buttons */
.btn{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line-2);
  background:var(--panel-2); color:var(--text); padding:8px 13px; border-radius:9px;
  font-size:13px; font-weight:500; transition:.12s; white-space:nowrap}
.btn:hover{border-color:var(--muted-2)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#8b5bff); border-color:transparent;
  color:#fff; font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.btn.icon{padding:8px}
.btn svg{width:16px; height:16px}
.btn:disabled{opacity:.4; cursor:not-allowed}
.btn.sm{padding:6px 10px; font-size:12px}

.hint{color:var(--muted-2); font-size:11px; line-height:1.5; margin-top:8px}
.divider{height:1px; background:var(--line); margin:14px 0}

/* toast */
#toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#1d2029; border:1px solid var(--line-2); color:var(--text); padding:10px 16px;
  border-radius:10px; font-size:13px; box-shadow:var(--shadow); opacity:0; pointer-events:none;
  transition:.2s; z-index:100}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
#toast.err{border-color:#e0555f}

.file-hidden{position:absolute; width:1px; height:1px; opacity:0; pointer-events:none}

/* 3x3 position picker */
.posgrid{display:grid; grid-template-columns:repeat(3,20px); gap:5px}
.posgrid button{width:20px; height:20px; border:1px solid var(--line-2); background:var(--panel-2);
  border-radius:5px; cursor:pointer; padding:0; position:relative; transition:.1s}
.posgrid button::after{content:''; position:absolute; inset:32%; border-radius:2px; background:var(--muted-2)}
.posgrid button:hover{border-color:var(--muted-2)}
.posgrid button.on{border-color:var(--accent); background:rgba(109,94,252,.18)}
.posgrid button.on::after{background:var(--accent)}

/* preset cards */
.presets{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.preset{border:1px solid var(--line-2); background:var(--panel-2); border-radius:9px; padding:5px;
  cursor:pointer; display:grid; gap:5px; transition:.1s}
.preset:hover{border-color:var(--accent)}
.preset .pv{aspect-ratio:16/10; border-radius:6px; display:grid; place-items:center; overflow:hidden}
.preset .pv i{width:60%; height:50%; background:#fff; border-radius:3px; box-shadow:0 3px 8px rgba(0,0,0,.35);
  display:block}
.preset .pn{font-size:10px; color:var(--muted); text-align:center; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis}
.upreset{display:flex; align-items:center; gap:6px; border:1px solid var(--line-2); background:var(--panel-2);
  border-radius:8px; padding:6px 10px; font-size:12px; width:100%; text-align:left; cursor:pointer}
.upreset:hover{border-color:var(--muted-2)}
.upreset .del{margin-left:auto; color:var(--muted-2); font-size:15px; line-height:1; padding:0 2px}
.upreset .del:hover{color:#e0555f}

/* noise overlay */
#noiseLayer{position:absolute; inset:0; z-index:5; pointer-events:none; display:none;
  mix-blend-mode:overlay; opacity:.5;
  background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMTIwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSczJyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJy8+PC9zdmc+")}

/* checkbox toggle */
.toggle{display:flex; align-items:center; gap:9px; margin-top:14px; font-size:12px;
  color:var(--muted); cursor:pointer; user-select:none}
.toggle input{appearance:none; -webkit-appearance:none; width:36px; height:20px; border-radius:20px;
  background:var(--line-2); position:relative; cursor:pointer; transition:.15s; flex:0 0 auto}
.toggle input:checked{background:var(--accent)}
.toggle input::after{content:''; position:absolute; top:2px; left:2px; width:16px; height:16px;
  border-radius:50%; background:#fff; transition:.15s}
.toggle input:checked::after{left:18px}
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 100 100"><rect x="20" y="28" width="60" height="44" rx="9" fill="none" stroke="white" stroke-width="8"/><circle cx="50" cy="50" r="11" fill="white"/></svg></span>
      Snappy Frame <small>screenshot beautifier</small>
    </div>
    <div class="spacer"></div>
    <div class="tb-group">
      <button class="btn sm lblbtn" id="btnScreen" title="Capture your screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <span class="lbl">Capture</span>
      </button>
      <button class="btn sm lblbtn" id="btnUpload" title="Upload an image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M6 10l6-6 6 6M4 20h16"/></svg>
        <span class="lbl">Upload</span>
      </button>
      <button class="btn sm icon" id="btnCopy" title="Copy to clipboard" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="btn primary" id="btnDownload" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
        Export
      </button>
    </div>
    <input type="file" id="fileInput" class="file-hidden" accept="image/*" />
    <input type="file" id="bgInput" class="file-hidden" accept="image/*" />
  </div>

  <div class="main">
    <!-- Preview -->
    <div class="stage-wrap" id="stageWrap">
      <div id="fit">
        <div id="stage">
          <div id="patternLayer"></div>
          <div id="persp">
            <div id="card">
              <div id="bar"><div class="dots"><i></i><i></i><i></i></div><div class="url"></div><div class="title"></div><div class="wbtns"><span>&#9472;</span><span>&#9723;</span><span>&#10005;</span></div></div>
              <img id="shot" alt="" />
            </div>
          </div>
          <div id="noiseLayer"></div>
        </div>
      </div>
      <div class="empty" id="empty">
        <div class="box">
          <h2>Drop a screenshot to begin</h2>
          <p>Drag &amp; drop an image, <kbd>⌘/Ctrl</kbd>+<kbd>V</kbd> to paste, upload, or capture your screen.</p>
          <button class="btn primary" id="btnUpload2">Choose image</button>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <aside class="panel" id="panel">
      <!-- Presets -->
      <section class="sec" data-sec="presets">
        <button class="head"><span class="ico">✨</span> Presets <span class="chev">▾</span></button>
        <div class="body">
          <div class="presets" id="presetGrid"></div>
          <div class="divider"></div>
          <button class="btn sm" id="btnSavePreset" style="width:100%;justify-content:center">＋ Save current style</button>
          <div id="userPresets" style="display:grid;gap:6px;margin-top:8px"></div>
        </div>
      </section>

      <!-- Background -->
      <section class="sec" data-sec="bg">
        <button class="head"><span class="ico">🎨</span> Background <span class="chev">▾</span></button>
        <div class="body">
          <div class="seg" id="bgType">
            <button data-v="gradient" class="on">Gradient</button>
            <button data-v="mesh">Mesh</button>
            <button data-v="solid">Solid</button>
            <button data-v="image">Image</button>
            <button data-v="none">None</button>
          </div>

          <div class="bg-panel" data-for="gradient">
            <div class="swatches" id="gradSwatches" style="margin-top:12px"></div>
            <div class="divider"></div>
            <div class="field"><label>Angle <span class="val" id="angleVal">120°</span></label>
              <input type="range" id="angle" min="0" max="360" value="120"></div>
            <div class="row2">
              <div class="color"><input type="color" id="gc1" value="#6d5efc"><input type="text" id="gc1t" value="#6D5EFC"></div>
              <div class="color"><input type="color" id="gc2" value="#c05bff"><input type="text" id="gc2t" value="#C05BFF"></div>
            </div>
          </div>

          <div class="bg-panel" data-for="mesh" hidden>
            <div class="swatches" id="meshSwatches" style="margin-top:12px"></div>
          </div>

          <div class="bg-panel" data-for="solid" hidden>
            <div class="color" style="margin-top:12px"><input type="color" id="solidC" value="#1e2233"><input type="text" id="solidCt" value="#1E2233"></div>
          </div>

          <div class="bg-panel" data-for="image" hidden>
            <button class="btn sm" id="btnBg" style="margin-top:12px;width:100%;justify-content:center">Upload wallpaper…</button>
            <div class="field" style="margin-top:12px"><label>Blur <span class="val" id="bgBlurVal">0px</span></label>
              <input type="range" id="bgBlur" min="0" max="40" value="0"></div>
          </div>

          <div class="bg-panel" data-for="none" hidden>
            <p class="hint" style="margin-top:12px">Transparent background — exports as a PNG with alpha.</p>
          </div>
        </div>
      </section>

      <!-- Pattern -->
      <section class="sec collapsed" data-sec="pattern">
        <button class="head"><span class="ico">🌀</span> Pattern <span class="chev">▾</span></button>
        <div class="body">
          <div class="chips" id="patType" style="margin-bottom:12px">
            <button data-v="none" class="on">None</button>
            <button data-v="dots">Dots</button>
            <button data-v="grid">Grid</button>
            <button data-v="waves">Waves</button>
            <button data-v="rings">Rings</button>
            <button data-v="cross">Cross</button>
            <button data-v="diag">Diagonal</button>
            <button data-v="checks">Checks</button>
            <button data-v="diamonds">Diamonds</button>
            <button data-v="chimes">Chimes</button>
            <button data-v="harmony">Harmony</button>
            <button data-v="confetti">Confetti</button>
            <button data-v="sight">Sight</button>
          </div>
          <div class="field"><label>Ink colour</label>
            <div class="seg" id="patColor">
              <button data-v="light" class="on">Light</button>
              <button data-v="dark">Dark</button>
            </div>
          </div>
          <div class="field"><label>Intensity <span class="val" id="patOpacityVal">18%</span></label>
            <input type="range" id="patOpacity" min="0" max="60" value="18"></div>
          <div class="field"><label>Scale <span class="val" id="patScaleVal">28px</span></label>
            <input type="range" id="patScale" min="10" max="90" value="28"></div>
          <div class="field"><label>Rotation <span class="val" id="patRotateVal">0°</span></label>
            <input type="range" id="patRotate" min="0" max="180" value="0"></div>
        </div>
      </section>

      <!-- Frame -->
      <section class="sec" data-sec="frame">
        <button class="head"><span class="ico">🖼️</span> Frame <span class="chev">▾</span></button>
        <div class="body">
          <div class="field"><label>Style</label>
            <select class="sel" id="frameType">
              <option value="none">None</option>
              <option value="arc">Arc (light matte)</option>
              <option value="eclipse">Eclipse (dark matte)</option>
              <option value="emotion">Emotion (white)</option>
              <option value="ruler">Ruler (dashed)</option>

<script>
(function(){
"use strict";
const $ = id => document.getElementById(id);
const stage=$('stage'), persp=$('persp'), card=$('card'), shot=$('shot'),
      bar=$('bar'), fit=$('fit'), wrap=$('stageWrap'), empty=$('empty');

// ---------- State ----------
const state = {
  hasImage:false, imgW:0, imgH:0,
  bgType:'gradient', gradAngle:120, gradC1:'#6d5efc', gradC2:'#c05bff',
  gradPreset:0, meshPreset:0, solid:'#1e2233', bgImage:null, bgBlur:0,
  pattern:'none', patColor:'light', patOpacity:18, patScale:28, patRotate:0,
  frame:'none', frameTitle:'',
  aspect:'auto', customW:1600, customH:1000, position:'mc', fill:false, posX:50, posY:50, size:100, pad:64, rad:14, noise:false,
  shadowPreset:'md', shBlur:40, shY:24, shOp:35,
  rx:0, ry:0, rz:0,
  bw:0, bc:'#ffffff',
  fmt:'png', scale:2,
};

const GRADIENTS = [
  ['#6d5efc','#c05bff'],['#ff6a88','#ff99ac'],['#0ba360','#3cba92'],
  ['#f6d365','#fda085'],['#4facfe','#00f2fe'],['#fa709a','#fee140'],
  ['#30cfd0','#330867'],['#a8edea','#fed6e3'],['#5ee7df','#b490ca'],
  ['#f093fb','#f5576c'],['#243949','#517fa4'],['#ee9ca7','#ffdde1'],
  ['#8e2de2','#4a00e0'],['#00c6ff','#0072ff'],['#f83600','#f9d423'],
  ['#11998e','#38ef7d'],['#ee0979','#ff6a00'],['#c33764','#1d2671'],
  ['#2193b0','#6dd5ed'],['#cc2b5e','#753a88'],['#dd5e89','#f7bb97'],
  ['#1f4037','#99f2c8'],['#141e30','#243b55'],['#ff512f','#dd2476'],
  ['#16bffd','#cb3066'],['#3a7bd5','#00d2ff'],['#dce35b','#45b649'],
  ['#e65c00','#f9d423'],['#0f0c29','#302b63'],['#ffe259','#ffa751'],
];
const MESHES = [
  'radial-gradient(at 20% 20%,#7b5cff 0,transparent 55%),radial-gradient(at 80% 15%,#ff6ec4 0,transparent 50%),radial-gradient(at 60% 80%,#22d3ee 0,transparent 55%),linear-gradient(120deg,#3a1c71,#2b1055)',
  'radial-gradient(at 15% 25%,#ffd166 0,transparent 50%),radial-gradient(at 85% 20%,#ff5e7e 0,transparent 50%),radial-gradient(at 50% 90%,#845ec2 0,transparent 55%),linear-gradient(120deg,#2d1b3d,#161022)',
  'radial-gradient(at 25% 15%,#00f5a0 0,transparent 50%),radial-gradient(at 80% 25%,#00d9f5 0,transparent 50%),radial-gradient(at 55% 85%,#0072ff 0,transparent 55%),linear-gradient(120deg,#04223d,#031425)',
  'radial-gradient(at 20% 30%,#ff9a9e 0,transparent 50%),radial-gradient(at 75% 15%,#fbc2eb 0,transparent 50%),radial-gradient(at 60% 80%,#a18cd1 0,transparent 55%),linear-gradient(120deg,#4a2c5a,#241030)',
  'radial-gradient(at 18% 22%,#f6d365 0,transparent 50%),radial-gradient(at 82% 22%,#fd6585 0,transparent 50%),radial-gradient(at 50% 88%,#ff7e5f 0,transparent 55%),linear-gradient(120deg,#3d1f1f,#1f0d16)',
  'radial-gradient(at 22% 20%,#43e97b 0,transparent 50%),radial-gradient(at 80% 30%,#38f9d7 0,transparent 50%),radial-gradient(at 55% 85%,#0f9b8e 0,transparent 55%),linear-gradient(120deg,#06251f,#031714)',
  'radial-gradient(at 20% 20%,#c471f5 0,transparent 50%),radial-gradient(at 80% 20%,#fa71cd 0,transparent 50%),radial-gradient(at 50% 85%,#5b6cff 0,transparent 55%),linear-gradient(120deg,#221033,#120826)',
  'radial-gradient(at 25% 25%,#e0e0e0 0,transparent 50%),radial-gradient(at 78% 20%,#b8c6db 0,transparent 50%),radial-gradient(at 55% 85%,#9face6 0,transparent 55%),linear-gradient(120deg,#2a2f3a,#171a22)',
  'radial-gradient(at 18% 18%,#ff8a00 0,transparent 50%),radial-gradient(at 82% 24%,#e52e71 0,transparent 50%),radial-gradient(at 50% 88%,#7b2ff7 0,transparent 55%),linear-gradient(120deg,#2a0a2e,#150618)',
  'radial-gradient(at 20% 22%,#13f1fc 0,transparent 50%),radial-gradient(at 80% 18%,#0470dc 0,transparent 50%),radial-gradient(at 55% 85%,#5c33cc 0,transparent 55%),linear-gradient(120deg,#04122e,#02091d)',
  'radial-gradient(at 22% 20%,#f9f047 0,transparent 50%),radial-gradient(at 78% 26%,#0fd850 0,transparent 50%),radial-gradient(at 55% 86%,#00b09b 0,transparent 55%),linear-gradient(120deg,#062617,#03170f)',
  'radial-gradient(at 20% 20%,#ff5f6d 0,transparent 50%),radial-gradient(at 80% 22%,#ffc371 0,transparent 50%),radial-gradient(at 52% 85%,#ff5f6d 0,transparent 55%),linear-gradient(120deg,#3a1418,#1c0a0d)',
  'radial-gradient(at 24% 18%,#a18cd1 0,transparent 50%),radial-gradient(at 80% 24%,#fbc2eb 0,transparent 50%),radial-gradient(at 55% 88%,#8ec5fc 0,transparent 55%),linear-gradient(120deg,#20233a,#111324)',
  'radial-gradient(at 18% 20%,#ff9966 0,transparent 50%),radial-gradient(at 82% 20%,#ff5e62 0,transparent 50%),radial-gradient(at 50% 88%,#c471ed 0,transparent 55%),linear-gradient(120deg,#2c1526,#160b16)',
];

// ---------- Helpers ----------
let toastT;
function toast(msg,isErr){
  const t=$('toast'); t.textContent=msg; t.classList.toggle('err',!!isErr);
  t.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
function bgCss(){
  switch(state.bgType){
    case 'gradient': return `linear-gradient(${state.gradAngle}deg,${state.gradC1},${state.gradC2})`;
    case 'mesh': return MESHES[state.meshPreset];
    case 'solid': return state.solid;
    case 'image': return state.bgImage ? `center/cover no-repeat url("${state.bgImage}")` : '#1e2233';
    case 'none': return 'transparent';
  }
}
function hexClean(v){ v=v.trim(); if(v[0]!=='#')v='#'+v; return /^#[0-9a-fA-F]{6}$/.test(v)?v:null; }

// ---------- Render ----------
function render(){
  empty.style.display = state.hasImage ? 'none' : '';
  // background
  const useBlur = state.bgType==='image' && state.bgBlur>0;
  stage.style.background = state.bgType==='none' ? 'transparent' : bgCss();
  // A blurred bg needs a pseudo layer; emulate with filter on a wrapper is messy -> use box-shadow trick:
  stage.style.filter = 'none';
  if(useBlur){
    // apply blur only to background via a layered approach: scale bg via inset shadow not possible;
    // simplest reliable: put blur on stage and counter-scale card. We instead overshoot bg with transform.
  }
  applyBgBlur(useBlur);

  // radius
  card.style.borderRadius = state.rad+'px';
  const _hasBar=/^(macos|browser|windows)/.test(state.frame);
  const _matte=/^(arc|eclipse|emotion|ruler)$/.test(state.frame);
  shot.style.borderRadius = _hasBar ? '0' : (_matte ? '7px' : state.rad+'px');

  // frame bar
  buildFrame();

  // border
  card.style.border = state.bw>0 ? `${state.bw}px solid ${state.bc}` : 'none';

  // shadow
  card.style.boxShadow = shadowCss();

  // noise overlay
  $('noiseLayer').style.display = state.noise ? 'block' : 'none';

  // background pattern overlay
  applyPattern();

  // layout (sizes stage, positions & tilts the card)
  layout();
  scheduleFit();
  updateDimHint();
}

const FIXED_SIZES={ '1:1':[1200,1200], '4:3':[1280,960], '3:4':[960,1280],
  '16:9':[1280,720], '9:16':[720,1280], '16:10':[1280,800], '2:1':[1280,640],
  '1.91:1':[1200,628],
  // social media (exact export dimensions)
  'ig-post':[1080,1080], 'ig-portrait':[1080,1350], 'ig-story':[1080,1920],
  'x-post':[1600,900], 'x-header':[1500,500], 'fb-post':[1200,630],
  'li-post':[1200,627], 'yt-thumb':[1280,720], 'pin':[1000,1500], 'appstore':[1920,1080] };

function rotCss(){ return `rotateX(${state.rx}deg) rotateY(${state.ry}deg) rotateZ(${state.rz}deg)`; }

// Size the stage and place the card. The card is centred by its *visual* (post-
// perspective) bounding box so a 3D tilt never clips against overflow:hidden.
function layout(){
  if(!state.hasImage){ persp.style.left='50%'; persp.style.top='50%';
    persp.style.transform='translate(-50%,-50%)';
    stage.style.width='420px'; stage.style.height='300px'; return; }

  const pad=state.pad;
  const fixed=state.aspect!=='auto';
  const fill=state.fill && fixed;                 // fill only crops on a fixed canvas
  const [FW,FH]= !fixed ? [0,0]
    : state.aspect==='custom' ? [state.customW, state.customH]
    : (FIXED_SIZES[state.aspect]||[1280,720]);

  if(fill){
    // Card becomes the fixed padded rectangle; the image *covers* it (cropped),
    // aimed by the focal point. Any frame bar sits on top; the image fills below.
    const cw=Math.max(60,FW-2*pad), ch=Math.max(60,FH-2*pad);
    card.classList.add('fill'); shot.classList.add('fill');
    card.style.width=cw+'px'; card.style.height=ch+'px';
    shot.style.width='100%'; shot.style.height='auto';
    shot.style.objectPosition=`${state.posX}% ${state.posY}%`;
  } else {
    // Fit: card shrink-wraps the whole image; longest side normalised for resolution.
    card.classList.remove('fill'); shot.classList.remove('fill');
    card.style.width=''; card.style.height=''; shot.style.objectPosition='';
    const base=Math.min(1000, Math.max(state.imgW,state.imgH));
    const k=base/Math.max(state.imgW,state.imgH);
    shot.style.width=(state.imgW*k)+'px'; shot.style.height='auto';
  }

  const rot=rotCss();
  // Measure in true (unscaled) px. #fit has a transform transition, so kill it
  // first — otherwise setting transform:none animates and we'd measure mid-zoom.
  const savedTrans=fit.style.transition, savedFit=fit.style.transform;
  fit.style.transition='none'; fit.style.transform='none'; void fit.offsetWidth;

  // measure layout box (untransformed) and visual box (tilted)
  card.style.transform='none'; const lay=card.getBoundingClientRect();
  card.style.transform=rot;    const vis=card.getBoundingClientRect();
  let dx=(vis.left+vis.width/2)-(lay.left+lay.width/2);
  let dy=(vis.top+vis.height/2)-(lay.top+lay.height/2);
  const sizeF=state.size/100;
  let vw=vis.width, vh=vis.height, scale=sizeF;

  let stageW, stageH;
  if(!fixed){
    stageW=Math.ceil(vw*scale+2*pad); stageH=Math.ceil(vh*scale+2*pad);
  } else {
    stageW=FW; stageH=FH;
    scale=Math.min(sizeF, (FW-2*pad)/vw, (FH-2*pad)/vh);   // shrink card to fit canvas
  }
  stage.style.width=stageW+'px'; stage.style.height=stageH+'px';
  const visW=vw*scale, visH=vh*scale;
  dx*=scale; dy*=scale;

  // Position: place the card's *visual* box against one of 9 anchors (only has an
  // effect when the fixed canvas leaves spare room; in Auto every anchor = centre).
  const P=state.position||'mc', pv=P[0], ph=P[1];
  const cx = ph==='l'? pad+visW/2 : ph==='r'? stageW-pad-visW/2 : stageW/2;
  const cy = pv==='t'? pad+visH/2 : pv==='b'? stageH-pad-visH/2 : stageH/2;

  // scale is applied *outside* the rotation so it scales the tilted result uniformly
  card.style.transform=(scale!==1?`scale(${scale}) `:'')+rot;
  persp.style.left=cx+'px'; persp.style.top=cy+'px';
  persp.style.transform=`translate(-50%,-50%) translate(${(-dx).toFixed(2)}px,${(-dy).toFixed(2)}px)`;
  fit.style.transform=savedFit; void fit.offsetWidth; fit.style.transition=savedTrans;
}

function applyPattern(){
  const pl=$('patternLayer'), s=state.patScale;
  if(state.pattern==='none' || state.patOpacity===0){ pl.style.display='none'; return; }
  pl.style.display='block';
  const dark=state.patColor==='dark', ink=dark?'black':'white', cx=dark?'#000':'#fff';
  const svg=str=>`url("data:image/svg+xml,${encodeURIComponent(str)}")`;
  const SVG=inner=>`<svg xmlns='http://www.w3.org/2000/svg' `+inner+`</svg>`;
  let img='', size=s+'px '+s+'px', pos='center';
  switch(state.pattern){
    case 'dots':  { const r=Math.max(1,s*0.055);
      img=`radial-gradient(${cx} ${r.toFixed(1)}px, transparent ${(r+0.7).toFixed(1)}px)`; break; }
    case 'grid':
      img=`linear-gradient(${cx} 1px,transparent 1px),linear-gradient(90deg,${cx} 1px,transparent 1px)`; break;
    case 'chimes':
      img=`repeating-linear-gradient(90deg, ${cx} 0 1.4px, transparent 1.4px ${s}px)`; size='auto'; break;
    case 'diag':
      img=`repeating-linear-gradient(45deg, ${cx} 0 1.4px, transparent 1.4px ${s}px)`; size='auto'; break;
    case 'rings':
      img=`repeating-radial-gradient(circle at 50% 50%, transparent 0 ${s-1.4}px, ${cx} ${s-1.4}px ${s}px)`;
      size='auto'; break;
    case 'checks': { const h=s/2;
      img=`linear-gradient(45deg,${cx} 25%,transparent 25% 75%,${cx} 75%),linear-gradient(45deg,${cx} 25%,transparent 25% 75%,${cx} 75%)`;
      pos=`0 0, ${h}px ${h}px`; break; }
    case 'waves': img=svg(SVG(`width='40' height='20'><path d='M0 14 Q10 4 20 14 T40 14' fill='none' stroke='${ink}' stroke-width='1.6'/>`)); size=(s*2)+'px '+s+'px'; break;
    case 'cross': img=svg(SVG(`width='20' height='20'><path d='M10 5V15 M5 10H15' stroke='${ink}' stroke-width='1.4'/>`)); break;
    case 'diamonds': img=svg(SVG(`width='20' height='20'><path d='M10 2 L18 10 L10 18 L2 10 Z' fill='none' stroke='${ink}' stroke-width='1.3'/>`)); break;
    case 'harmony': img=svg(SVG(`width='40' height='20'><g fill='none' stroke='${ink}' stroke-width='1.2'><path d='M0 20 A20 20 0 0 1 40 20'/><path d='M-20 20 A20 20 0 0 1 20 20'/><path d='M20 20 A20 20 0 0 1 60 20'/></g>`)); size=(s*2)+'px '+s+'px'; break;
    case 'sight': img=svg(SVG(`width='24' height='24'><g fill='none' stroke='${ink}' stroke-width='1.1'><circle cx='12' cy='12' r='3'/><path d='M12 2v4 M12 18v4 M2 12h4 M18 12h4'/></g>`)); break;
    case 'confetti': img=svg(SVG(`width='44' height='44' fill='${ink}'><rect x='5' y='7' width='5' height='5' transform='rotate(20 7 9)'/><circle cx='30' cy='11' r='2.6'/><rect x='19' y='28' width='4.5' height='4.5' transform='rotate(-15 21 30)'/><circle cx='9' cy='33' r='2'/><rect x='34' y='32' width='6' height='3'/><circle cx='38' cy='6' r='1.8'/>`)); break;
  }
  pl.style.backgroundImage=img; pl.style.backgroundSize=size; pl.style.backgroundPosition=pos;
  pl.style.opacity=(state.patOpacity/100).toFixed(2);

let bgBlurEl=null;

    bgBlurEl.style.cssText='position:absolute;inset:-60px;z-index:0;pointer-events:none';
    stage.insertBefore(bgBlurEl, stage.firstChild);
  }
  stage.style.background='#1e2233';

  bgBlurEl.style.filter=`blur(${state.bgBlur}px)`;

function shadowCss(){
  let base;
  if(state.shadowPreset==='none' && state.shBlur===0) base='none';
  else if(state.shadowPreset==='glow') base=`0 0 ${state.shBlur}px rgba(109,94,252,${state.shOp/100})`;
  else base=`0 ${state.shY}px ${state.shBlur}px rgba(0,0,0,${state.shOp/100})`;
  // Stack frames: two sheets peeking above the card (box-shadow follows its radius).
  if(state.frame==='stack-light' || state.frame==='stack-dark'){
    const dark=state.frame==='stack-dark';
    const s1=dark?'#2a2d38':'#eeeef1', s2=dark?'#21232c':'#e0e0e5';
    const drop = base==='none' ? `0 14px 34px rgba(0,0,0,${dark?.45:.28})` : base;
    return `0 -12px 0 -3px ${s1}, 0 -24px 0 -8px ${s2}, ${drop}`;
  }
  // Backing frames: a single offset plate behind the card.
  if(state.frame==='silver-back'){
    const drop = base==='none' ? '0 12px 30px rgba(0,0,0,.25)' : base;
    return `14px 14px 0 -1px #d7d9e0, ${drop}`;
  }
  if(state.frame==='shadow-back'){
    const drop = base==='none' ? '0 12px 30px rgba(0,0,0,.25)' : base;
    return `16px 16px 0 -1px rgba(15,16,22,.5), ${drop}`;
  }
  return base;
}

const MATTE_FRAMES=['arc','eclipse','emotion','ruler','shortboard'];
function buildFrame(){
  const f=state.frame;
  MATTE_FRAMES.forEach(m=>card.classList.toggle(m, f===m));
  const kind = f.split('-')[0];                      // macos | browser | windows | (else)
  const hasBar = kind==='macos' || kind==='browser' || kind==='windows';
  if(!hasBar){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const subtle = f==='macos-subtle', adaptive = f==='macos-adaptive';
  const light = (f.includes('light') || subtle) && !adaptive;
  bar.style.background = subtle ? '#f7f7f9' : adaptive ? '#c3c6ce'
    : light ? '#f4f5f7' : '#2a2d38';
  bar.style.borderBottom = (light||subtle||adaptive) ? '1px solid #e6e7ec' : '1px solid #1a1c24';
  const dotsEl=bar.querySelector('.dots'), urlEl=bar.querySelector('.url'),
        titleEl=bar.querySelector('.title'), wbtns=bar.querySelector('.wbtns');
  const dots=dotsEl.querySelectorAll('i');
  const grey = subtle || adaptive;
  const cols = grey ? ['#9ba0ab','#9ba0ab','#9ba0ab'] : ['#ff5f57','#febc2e','#28c840'];
  dots.forEach((d,i)=>d.style.background=cols[i]);
  // reset parts
  dotsEl.style.display='none'; urlEl.style.display='none';
  titleEl.style.display='none'; wbtns.style.display='none';
  const darkBar = !light && !subtle && !adaptive;
  if(kind==='windows'){
    titleEl.style.display='block'; titleEl.style.textAlign='left';
    titleEl.style.paddingLeft='12px'; titleEl.style.color = darkBar ? '#c7cbd6' : '#4a4f5c';
    titleEl.textContent = state.frameTitle || '';
    wbtns.style.display='flex'; wbtns.style.color = darkBar ? '#aeb2bd' : '#5a5f6b';
  } else if(kind==='browser'){
    dotsEl.style.display='flex';
    urlEl.style.display='flex';
    urlEl.style.background = light ? '#fff' : '#1c1f28';
    urlEl.style.color = light ? '#6b7180' : '#9aa0b0';
    urlEl.textContent = state.frameTitle || 'example.com';
  } else { // macos
    dotsEl.style.display='flex';
    titleEl.style.display='block'; titleEl.style.textAlign='center'; titleEl.style.paddingLeft='0';
    titleEl.style.color = darkBar ? '#c7cbd6' : '#4a4f5c';
    titleEl.textContent = state.frameTitle || '';
  }
}

function doFit(){

function loadImage(src){

    shot.src=src;

// screen capture
async function captureScreen(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia){
    toast('Screen capture not supported in this browser',true); return;
  }
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:'never'},audio:false});
    const track=stream.getVideoTracks()[0];
    const v=document.createElement('video'); v.srcObject=stream; v.muted=true;
    await v.play(); await new Promise(r=>setTimeout(r,180));
    const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    track.stop(); stream.getTracks().forEach(t=>t.stop());
    loadImage(c.toDataURL('image/png'));
  }catch(e){ if(e.name!=='NotAllowedError') toast('Capture failed',true); }
}

// ---------- Export ----------
async function renderBlob(){
  const [w,h]=outSize();
  const opts={ pixelRatio:state.scale, width:stage.offsetWidth, height:stage.offsetHeight,
    style:{transform:'none'}, cacheBust:true };
  if(state.fmt==='jpeg'){
    opts.backgroundColor = state.bgType==='none' ? '#ffffff' : undefined;
    opts.quality=0.95;
    return await htmlToImage.toBlob(stage, {...opts, type:'image/jpeg'});
  }
  return await htmlToImage.toBlob(stage, opts);
}
async function download(){
  if(!state.hasImage) return;
  const btns=[$('btnDownload'),$('btnDownload2')]; btns.forEach(b=>b.disabled=true);
  try{
    const blob=await renderBlob();
    const a=document.createElement('a');
    const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    a.href=URL.createObjectURL(blob); a.download=`snappy-${ts}.${state.fmt==='jpeg'?'jpg':'png'}`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    toast('Downloaded');
  }catch(e){ console.error(e); toast('Export failed',true); }
  btns.forEach(b=>b.disabled=false);
}
async function copyImg(){
  if(!state.hasImage) return;
  if(!navigator.clipboard || !window.ClipboardItem){ toast('Clipboard not supported — use Export',true); return; }
  try{
    const prevFmt=state.fmt; state.fmt='png';
    const blob=await renderBlob(); state.fmt=prevFmt;
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    toast('Copied to clipboard');
  }catch(e){ console.error(e); toast('Copy failed',true); }
}

function presetBg(s){
  if(s.bgType==='mesh')  return MESHES[s.meshPreset||0];
  if(s.bgType==='solid') return s.solid||'#1e2233';
  const g=GRADIENTS[s.gradPreset||0]; return `linear-gradient(135deg,${g[0]},${g[1]})`;
}
function applyPreset(s){
  state.bgType=s.bgType;
  if(s.gradPreset!=null){ state.gradPreset=s.gradPreset; state.gradC1=GRADIENTS[s.gradPreset][0]; state.gradC2=GRADIENTS[s.gradPreset][1]; }
  if(s.meshPreset!=null) state.meshPreset=s.meshPreset;
  if(s.solid) state.solid=s.solid;
  state.pattern=s.pattern||'none'; if(s.patOpacity!=null) state.patOpacity=s.patOpacity;
  state.frame=s.frame||'none';
  if(s.shadow){ state.shadowPreset=s.shadow; const v=SH[s.shadow]; state.shBlur=v[0]; state.shY=v[1]; state.shOp=v[2]; }
  if(s.tilt){ const t=TILT[s.tilt]; state.rx=t[0]; state.ry=t[1]; state.rz=t[2]; }
  if(s.rad!=null) state.rad=s.rad; if(s.pad!=null) state.pad=s.pad;
  syncUI(); render();
}
(function(){ const grid=$('presetGrid');
  BUILTIN_PRESETS.forEach(p=>{ const b=document.createElement('button'); b.className='preset'; b.title=p.n;
    const pv=document.createElement('span'); pv.className='pv'; pv.style.background=presetBg(p.s);
    const i=document.createElement('i');
    if(p.s.tilt&&TILT[p.s.tilt]){ const t=TILT[p.s.tilt];
      i.style.transform=`perspective(140px) rotateX(${t[0]/2}deg) rotateY(${t[1]/2}deg)`; }
    pv.appendChild(i); b.appendChild(pv);
    const n=document.createElement('span'); n.className='pn'; n.textContent=p.n; b.appendChild(n);
    b.onclick=()=>{ applyPreset(p.s); toast(p.n+' applied'); };
    grid.appendChild(b); });
})();

// Saved presets (localStorage). Screenshot + wallpaper image are excluded to stay small.
const STYLE_KEYS=['bgType','gradAngle','gradC1','gradC2','gradPreset','meshPreset','solid','bgBlur',
  'pattern','patColor','patOpacity','patScale','patRotate','frame','frameTitle','aspect','customW','customH',
  'position','fill','posX','posY','size','pad','rad','noise','shadowPreset','shBlur','shY','shOp','rx','ry','rz','bw','bc'];
const PKEY='snappy_presets_v1';
function loadUser(){ try{ return JSON.parse(localStorage.getItem(PKEY))||[]; }catch(e){ return []; } }
function saveUser(a){ try{ localStorage.setItem(PKEY,JSON.stringify(a)); }catch(e){ toast('Could not save (storage full)',true); } }
function renderUser(){ const box=$('userPresets'); box.innerHTML='';
  loadUser().forEach((p,idx)=>{ const row=document.createElement('button'); row.className='upreset';
    const label=document.createElement('span'); label.textContent='✨ '+p.name;
    const del=document.createElement('span'); del.className='del'; del.textContent='×'; del.title='Delete';
    row.appendChild(label); row.appendChild(del);
    row.onclick=e=>{ if(e.target===del){ const a=loadUser(); a.splice(idx,1); saveUser(a); renderUser(); return; }
      STYLE_KEYS.forEach(k=>{ if(p.style[k]!==undefined) state[k]=p.style[k]; });
      syncUI(); render(); toast(p.name+' applied'); };
    box.appendChild(row); });
}
$('btnSavePreset').onclick=()=>{ const name=(prompt('Preset name:')||'').trim(); if(!name) return;
  const style={}; STYLE_KEYS.forEach(k=>style[k]=state[k]);
  const a=loadUser(); a.push({name,style}); saveUser(a); renderUser(); toast('Preset saved'); };
renderUser();

render();
})();
</script>
