name: Bug report
description: Report a problem with Snappy Frame or the capture extension
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve **Snappy Frame**! Please fill in what you can.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
      placeholder: |
        1. Went to…
        2. Clicked…
        3. Expected… but saw…
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where did it happen?
      options:
        - Web app (snappy-frame.netlify.app)
        - Chrome extension (Capture)
        - Both / not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser & operating system
      placeholder: e.g. Chrome 126 on Windows 11 / Safari 17 on macOS 14
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshot or extra detail (optional)
      description: Drag an image in, or paste any console errors (F12 → Console).
